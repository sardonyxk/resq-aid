<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResQ-Aid — Coordinator Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">

  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-rose-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">🚑</div>
        <div>
          <h1 class="text-lg font-extrabold tracking-tight text-slate-900">ResQ-Aid</h1>
          <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-wide">Coordinator Dashboard</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="userNameOut" class="text-sm font-medium text-slate-600"></span>
        <button type="button" id="logoutBtn" class="text-xs text-slate-400 hover:text-slate-700 underline">Log out</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 flex flex-col gap-8">

    <div id="toast" class="hidden fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-xl text-sm font-medium"></div>

    <!-- Not authorized state -->
    <div id="unauthorizedCard" class="hidden bg-white rounded-2xl shadow-sm border border-rose-200 p-8 text-center">
      <p class="text-lg font-bold text-rose-700">Not authorized</p>
      <p class="text-sm text-slate-500 mt-2">This dashboard is only available to coordinators and admins.</p>
      <a href="index.html" class="inline-block mt-4 text-sm text-blue-600 hover:underline">← Back to report form</a>
    </div>

    <div id="dashboardContent" class="hidden flex flex-col gap-8">

      <!-- Cases section -->
      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-slate-900">Active Cases</h2>
          <button id="refreshCasesBtn" type="button" class="text-xs text-blue-600 hover:underline">Refresh</button>
        </div>
        <div id="casesList" class="flex flex-col gap-3"></div>
        <p id="casesEmpty" class="hidden text-sm text-slate-400 text-center py-6">No cases yet.</p>
      </section>

      <!-- Teams section -->
      <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-slate-900">Rescue Teams</h2>
          <button id="addTeamBtn" type="button" class="text-xs bg-slate-900 hover:bg-slate-800 text-white font-semibold px-3 py-1.5 rounded-lg">
            + Add team
          </button>
        </div>
        <div id="teamsList" class="flex flex-col gap-3"></div>
      </section>

      <!-- Add team form (hidden until toggled) -->
      <div id="addTeamForm" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col gap-4">
        <h3 class="text-sm font-bold text-slate-900">New Rescue Team</h3>
        <input type="text" id="newTeamName" placeholder="Team name" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2" />
        <input type="text" id="newTeamPhone" placeholder="Phone (optional)" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2" />
        <div class="grid grid-cols-2 gap-3">
          <input type="number" step="any" id="newTeamLat" placeholder="Latitude" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2" />
          <input type="number" step="any" id="newTeamLng" placeholder="Longitude" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2" />
        </div>
        <div class="flex gap-2">
          <button type="button" id="saveTeamBtn" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-semibold py-2 rounded-lg text-sm">Save team</button>
          <button type="button" id="cancelTeamBtn" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-2 rounded-lg text-sm">Cancel</button>
        </div>
      </div>

    </div>

  </main>

<script>
  const BACKEND_URL = 'http://localhost:5000';
  const STATUS_OPTIONS = ['reported', 'triaged', 'dispatched', 'in_progress', 'rescued', 'closed', 'cancelled'];

  const accessToken = sessionStorage.getItem('resqaid_access_token');
  if (!accessToken) {
    window.location.href = 'login.html';
  }
  document.getElementById('userNameOut').textContent = sessionStorage.getItem('resqaid_user_name') || '';

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('resqaid_access_token');
    sessionStorage.removeItem('resqaid_user_name');
    window.location.href = 'login.html';
  });

  const toast = document.getElementById('toast');
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'fixed top-5 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-xl text-sm font-medium ' +
      (type === 'error' ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white');
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 4000);
  }

  async function authedFetch(path, options = {}) {
    const res = await fetch(BACKEND_URL + path, {
      ...options,
      headers: {
        ...(options.headers || {}),
        'Authorization': 'Bearer ' + accessToken,
      },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('resqaid_access_token');
      window.location.href = 'login.html';
      throw new Error('Session expired');
    }
    return res;
  }

  let teamsCache = [];

  async function loadTeams() {
    const res = await authedFetch('/api/admin/teams');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load teams');
    teamsCache = data.teams;
    renderTeams();
  }

  function renderTeams() {
    const list = document.getElementById('teamsList');
    list.innerHTML = '';
    teamsCache.forEach((team) => {
      const row = document.createElement('div');
      row.className = 'flex items-center justify-between border border-slate-100 rounded-xl px-4 py-3';
      row.innerHTML = `
        <div>
          <p class="text-sm font-semibold text-slate-800">${team.name}</p>
          <p class="text-xs text-slate-400">${team.phone || 'No phone on file'}</p>
        </div>
        <label class="flex items-center gap-2 text-xs font-medium ${team.is_available ? 'text-emerald-600' : 'text-slate-400'}">
          <input type="checkbox" data-team-id="${team.id}" class="availability-toggle" ${team.is_available ? 'checked' : ''} />
          ${team.is_available ? 'Available' : 'Unavailable'}
        </label>
      `;
      list.appendChild(row);
    });

    document.querySelectorAll('.availability-toggle').forEach((el) => {
      el.addEventListener('change', async (e) => {
        const teamId = e.target.getAttribute('data-team-id');
        try {
          const res = await authedFetch(`/api/admin/teams/${teamId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isAvailable: e.target.checked }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          showToast('Team updated', 'success');
          await loadTeams();
        } catch (err) {
          showToast(err.message || 'Update failed', 'error');
        }
      });
    });
  }

  async function loadCases() {
    const res = await authedFetch('/api/admin/cases');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load cases');
    renderCases(data.cases);
  }

  function renderCases(cases) {
    const list = document.getElementById('casesList');
    const empty = document.getElementById('casesEmpty');
    list.innerHTML = '';

    if (!cases.length) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    cases.forEach((c) => {
      const row = document.createElement('div');
      row.className = 'border border-slate-100 rounded-xl p-4 flex flex-col gap-3';

      const teamOptions = teamsCache.map((t) =>
        `<option value="${t.id}" ${c.assigned_team_id === t.id ? 'selected' : ''}>${t.name}</option>`
      ).join('');

      const statusOptions = STATUS_OPTIONS.map((s) =>
        `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`
      ).join('');

      row.innerHTML = `
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm font-semibold text-slate-800 capitalize">${c.animal_type} — urgency ${c.urgency_score ?? '—'}/5</p>
            <p class="text-xs text-slate-500 mt-1">${c.description || 'No description'}</p>
            <p class="text-[11px] text-slate-400 mt-1">${c.landmark || ''}</p>
          </div>
          <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full bg-slate-100 text-slate-600 whitespace-nowrap">${c.status}</span>
        </div>
            ${c.lat && c.lng ? `
            <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}" target="_blank"
                class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1 w-fit">
                📍 Get directions
            </a>
    ` : ''}
        <div class="flex items-center gap-2 flex-wrap">
          <select class="status-select text-xs border border-slate-200 rounded-lg px-2 py-1.5" data-case-id="${c.id}">
            ${statusOptions}
          </select>
          <select class="team-select text-xs border border-slate-200 rounded-lg px-2 py-1.5" data-case-id="${c.id}">
            <option value="">Assign team...</option>
            ${teamOptions}
          </select>
        </div>
      `;
      list.appendChild(row);
    });

    document.querySelectorAll('.status-select').forEach((el) => {
      el.addEventListener('change', async (e) => {
        const caseId = e.target.getAttribute('data-case-id');
        try {
          const res = await authedFetch(`/api/admin/cases/${caseId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: e.target.value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          showToast('Status updated', 'success');
        } catch (err) {
          showToast(err.message || 'Update failed', 'error');
        }
      });
    });

    document.querySelectorAll('.team-select').forEach((el) => {
      el.addEventListener('change', async (e) => {
        if (!e.target.value) return;
        const caseId = e.target.getAttribute('data-case-id');
        try {
          const res = await authedFetch(`/api/admin/cases/${caseId}/assign`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ teamId: e.target.value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);
          showToast('Team assigned', 'success');
          await loadCases();
        } catch (err) {
          showToast(err.message || 'Assignment failed', 'error');
        }
      });
    });
  }

  document.getElementById('refreshCasesBtn').addEventListener('click', () => loadCases().catch((e) => showToast(e.message, 'error')));

  document.getElementById('addTeamBtn').addEventListener('click', () => {
    document.getElementById('addTeamForm').classList.remove('hidden');
  });
  document.getElementById('cancelTeamBtn').addEventListener('click', () => {
    document.getElementById('addTeamForm').classList.add('hidden');
  });
  document.getElementById('saveTeamBtn').addEventListener('click', async () => {
    const name = document.getElementById('newTeamName').value.trim();
    const phone = document.getElementById('newTeamPhone').value.trim();
    const lat = document.getElementById('newTeamLat').value;
    const lng = document.getElementById('newTeamLng').value;

    if (!name || !lat || !lng) {
      showToast('Name, latitude, and longitude are required', 'error');
      return;
    }

    try {
      const res = await authedFetch('/api/admin/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone: phone || null, lat: Number(lat), lng: Number(lng) }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      showToast('Team created', 'success');
      document.getElementById('addTeamForm').classList.add('hidden');
      document.getElementById('newTeamName').value = '';
      document.getElementById('newTeamPhone').value = '';
      document.getElementById('newTeamLat').value = '';
      document.getElementById('newTeamLng').value = '';
      await loadTeams();
    } catch (err) {
      showToast(err.message || 'Failed to create team', 'error');
    }
  });

  // --- Init ---
  (async () => {
    try {
      await loadTeams();
      await loadCases();
      document.getElementById('dashboardContent').classList.remove('hidden');
    } catch (err) {
      // A 403 from either call means not authorized -- show that state instead of the dashboard
      document.getElementById('unauthorizedCard').classList.remove('hidden');
    }
  })();
</script>
</body>
</html>
